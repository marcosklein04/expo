{% load static %}
<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ingresar DNI</title>
  <link rel="stylesheet" href="{% static 'style/style.css' %}">
  <script src="{% static 'js/kiosk/dni.js' %}" defer></script>
</head>
<body
  class="page-dni"
  data-idle-ms="{{ idle_seconds|default:0 }}000"
  data-start-url="{% url 'kiosk:start' %}"
  data-vouchers-url="{% url 'kiosk:vouchers' %}"
>
  <main class="kiosk-shell">
    <div class="kiosk-brand" aria-label="Valtra Fendt">
      <span class="brand-valtra">VALTRA</span>
      <span class="brand-fendt">FENDT</span>
    </div>
    <h1 class="kiosk-title">DNI</h1>

    <input id="dni" class="dni-input" type="text" inputmode="numeric" maxlength="12" autocomplete="off" readonly>

    <section class="number-pad" id="pad"></section>

    <section class="dni-actions">
      <button class="kiosk-button secondary" id="clear">Borrar</button>
      <button class="kiosk-button" id="continue">Continuar</button>
    </section>
  </main>

</body>
</html>
