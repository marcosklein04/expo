{% load static %}
<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ingresar Documento</title>
  <link rel="stylesheet" href="{% static 'style/style.css' %}">
  <script src="{% static 'js/kiosk/dni.js' %}" defer></script>
</head>
<body
  class="page-dni"
  data-idle-ms="{{ idle_seconds|default:0 }}000"
  data-start-url="{% url 'kiosk:start' %}"
  data-vouchers-url="{% url 'kiosk:vouchers' %}"
>
  <main class="kiosk-shell">
    <div class="kiosk-brand" aria-label="Valtra Fendt">
      <img class="brand-logo brand-logo-valtra" src="{% static 'images/valtra-logo.png' %}" alt="Valtra">
      <img class="brand-logo brand-logo-fendt" src="{% static 'images/fendt-logo.svg' %}" alt="Fendt">
    </div>

    <section class="document-panel">
      <section class="document-type-toggle" aria-label="Tipo de documento">
        <button type="button" class="document-type-btn is-active" data-doc-type="DNI">DNI</button>
        <button type="button" class="document-type-btn" data-doc-type="PASAPORTE">Pasaporte</button>
      </section>

      <input
        id="document-input"
        class="document-input"
        type="text"
        inputmode="numeric"
        pattern="[0-9]*"
        maxlength="12"
        autocomplete="off"
        autocapitalize="off"
        spellcheck="false"
        enterkeyhint="done"
        placeholder="Ingresá tu DNI"
      >

      <p class="document-hint" id="document-hint">Ingresá tu DNI sin puntos.</p>

      <section class="dni-actions">
        <button class="kiosk-button" id="continue">Confirmar</button>
      </section>
    </section>
  </main>

</body>
</html>
