{% load static %}
<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Expo Kiosco</title>
  <link rel="stylesheet" href="{% static 'style/style.css' %}?v=20260305-4">
  <script src="{% static 'js/print.js' %}?v=20260305-3" defer></script>
  <script src="{% static 'js/kiosk/start.js' %}?v=20260305-3" defer></script>
</head>
<body class="page-start brand-{{ brand.slug }}" data-dni-url="{{ urls.dni }}">
  <main class="kiosk-shell" id="start-screen">
    <div class="kiosk-brand" aria-label="{{ brand.nombre }}">
      {% for logo in brand.logos %}
        <img
          class="brand-logo {{ logo.class_name }}"
          src="{% static logo.src %}"
          alt="{{ logo.alt }}"
        >
      {% endfor %}
    </div>

    <section class="kiosk-center">
      <p class="start-prompt">
        <span>TOCÁ LA</span>
        <span class="strong">PANTALLA</span>
        <span>PARA</span>
        <span class="strong">COMENZAR</span>
      </p>
      <button class="kiosk-button" id="start-btn">Comenzar</button>
    </section>

    <div class="start-bottom-logo" aria-label="ADE">
      <img src="{% static 'images/ade-logo.png' %}" alt="ADE">
    </div>
  </main>

</body>
</html>
