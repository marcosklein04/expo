{% load static %}
<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Expo Kiosco</title>
  <link rel="stylesheet" href="{% static 'style/style.css' %}">
  <script src="{% static 'js/print.js' %}" defer></script>
  <script src="{% static 'js/kiosk/start.js' %}" defer></script>
</head>
<body class="page-start" data-dni-url="{% url 'kiosk:dni' %}">
  <main class="kiosk-shell" id="start-screen">
    <div class="kiosk-brand" aria-label="Valtra Fendt">
      <span class="brand-valtra">VALTRA</span>
      <span class="brand-fendt">FENDT</span>
    </div>

    <section class="kiosk-center">
      <p class="start-prompt">
        <span>TOCÁ LA</span>
        <span class="strong">PANTALLA</span>
        <span>PARA</span>
        <span class="strong">COMENZAR</span>
      </p>
      <button class="kiosk-button" id="start-btn">Comenzar</button>
    </section>
  </main>

</body>
</html>
